                <div class="bg-white dark:bg-gray-700 p-5 rounded-lg border border-gray-300 dark:border-gray-600 shadow-md">
                    
                    <div class="flex flex-col gap-2 mb-4">
                        <button id="calcWhiteBtn" class="w-full bg-gradient-to-b from-gray-100 to-gray-300 hover:from-gray-200 hover:to-gray-400 text-gray-800 py-3 px-4 rounded border border-gray-400 transition font-bold text-lg shadow-md">⚪ إحسب أفضل حركة للأبيض</button>
                        <button id="calcBlackBtn" class="w-full bg-gradient-to-b from-gray-700 to-gray-900 hover:from-gray-600 hover:to-gray-800 text-white py-3 px-4 rounded border border-gray-600 transition font-bold text-lg shadow-md">⚫ إحسب أفضل حركة للأسود</button>
                    </div>

                    <!-- التعديل هنا: 3 زراير جنب بعض لورا ولقدام ولف اللوحة -->
                    <div class="grid grid-cols-3 gap-2 mb-2">
                        <button id="undoBtn" class="bg-yellow-500 hover:bg-yellow-400 text-gray-900 font-bold py-2 px-1 rounded border border-yellow-600 shadow-sm transition text-sm">◀️ لورا</button>
                        <button id="redoBtn" class="bg-blue-500 hover:bg-blue-400 text-white font-bold py-2 px-1 rounded border border-blue-600 shadow-sm transition text-sm">لقدام ▶️</button>
                        <button id="flipBtn" class="bg-gray-500 hover:bg-gray-400 text-white font-bold py-2 px-1 rounded border border-gray-600 shadow-sm transition text-sm">🔄 لف اللوحة</button>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-2">
                        <button id="resetBtn" class="bg-red-500 hover:bg-red-400 text-white font-bold py-2 px-2 rounded border border-red-600 shadow-sm transition">🗑️ لعبة جديدة</button>
                        <button id="clearBtn" class="bg-purple-500 hover:bg-purple-400 text-white font-bold py-2 px-2 rounded border border-purple-600 shadow-sm transition">🧹 إمسح اللوحة</button>
                    </div>
                </div>

                <!-- صندوق التحليل (تم إضافته ليعمل بشكل سليم) -->
                

            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

    <script>
        var board = null;
        var game = new Chess();
        var $status = $('#status');
        var $fenOutput = $('#fenOutput');
        var fenHistory = [];
        var redoHistory = []; // مصفوفة جديدة لحفظ الحركات لقدام
        var isCalculating = false;

        // --- نظام التايمر ---
        var timerSeconds = 0;
        var timerInterval = null;
        var isTimerRunning = false;

        function formatTime(sec) {
            var m = Math.floor(sec / 60).toString().padStart(2, '0');
            var s = (sec % 60).toString().padStart(2, '0');
            return m + ':' + s;
        }

        function startTimer() {
            if (!isTimerRunning) {
                isTimerRunning = true;
                timerInterval = setInterval(function() {
                    timerSeconds++;
                    $('#timerDisplay').text(formatTime(timerSeconds));
                }, 1000);
            }
        }

        function stopTimer() {
            if (isTimerRunning) {
                clearInterval(timerInterval);
                isTimerRunning = false;
            }
        }

        function resetTimer() {
            stopTimer();
            timerSeconds = 0;
            $('#timerDisplay').text('00:00');
        }

        // --- المؤثرات الصوتية ---
        var moveSound = new Audio('https://images.chesscomfiles.com/chess-themes/sounds/_MP3_/default/move-self.mp3');
        var captureSound = new Audio('https://images.chesscomfiles.com/chess-themes/sounds/_MP3_/default/capture.mp3');
        var checkSound = new Audio('https://images.chesscomfiles.com/chess-themes/sounds/_MP3_/default/check.mp3');
        var gameEndSound = new Audio('https://images.chesscomfiles.com/chess-themes/sounds/_MP3_/default/game-end.mp3');

        function playMoveSound(isCapture) {
            if (game.game_over()) {
                gameEndSound.play().catch(function(){});
            } else if (game.in_check()) {
                checkSound.play().catch(function(){});
            } else if (isCapture) {
                captureSound.play().catch(function(){});
            } else {
                moveSound.play().catch(function(){});
            }
        }

        // --- دوال الهايلايت ---
        function removeHighlights() {
            $('.highlight-move').removeClass('highlight-move');
        }

        function highlightMove(source, target) {
            removeHighlights();
            if (source && source !== 'spare' && source !== 'offboard') {
                $('#myBoard .square-' + source).addClass('highlight-move');
            }
            if (target && target !== 'offboard') {
                $('#myBoard .square-' + target).addClass('highlight-move');
            }
        }

        // --- الحماية ومنع اللعب ---
        function onDragStart (source, piece, position, orientation) {
            if (game.game_over()) return false;
            if (isCalculating) return false; 

            var mode = $('input[name="playMode"]:checked').val();
            
            if (mode === 'white' && game.turn() === 'b') return false;
            if (mode === 'black' && game.turn() === 'w') return false;

            if (mode === 'white' && piece.search(/^b/) !== -1) return false;
            if (mode === 'black' && piece.search(/^w/) !== -1) return false;
        }

        function onDrop (source, target, piece, newPos, oldPos, orientation) {
            if (source === target) return 'snapback';
            
            startTimer();
            fenHistory.push(game.fen());
            redoHistory = []; // تفريغ الحركات المستقبلية عند لعب حركة جديدة

            var isCapture = false;

            if (source === 'spare') {
                isCapture = game.get(target) !== null;
                game.put({ type: piece[1].toLowerCase(), color: piece[0] }, target);
            } 
            else if (target === 'offboard') {
                game.remove(source);
            } 
            else {
                var tempMove = game.move({ from: source, to: target, promotion: 'q' });
                if (tempMove !== null) {
                    isCapture = tempMove.captured != null;
                    game.undo(); 
                } else {
                    isCapture = game.get(target) !== null;
                }

                var move = game.move({ from: source, to: target, promotion: 'q' });
                if (move === null) {
                    game.remove(source);
                    game.put({ type: piece[1].toLowerCase(), color: piece[0] }, target);
                }
            }

            updateStatus();
            highlightMove(source, target);
            playMoveSound(isCapture);

            var mode = $('input[name="playMode"]:checked').val();
            if ((mode === 'white' && game.turn() === 'b' && !game.game_over()) || 
                (mode === 'black' && game.turn() === 'w' && !game.game_over())) {
                setTimeout(makeComputerMove, 400); 
            }
        }

        function onSnapEnd () {
            board.position(game.fen());
        }

        function updateStatus () {
            var statusHTML = '';
            var moveColor = (game.turn() === 'w') ? 'الأبيض' : 'الأسود';

            if (game.in_checkmate()) {
                statusHTML = 'كش مات! الفائز: ' + (moveColor === 'الأبيض' ? 'الأسود' : 'الأبيض');
                $status.removeClass('text-blue-600 dark:text-blue-300 text-yellow-600 dark:text-yellow-400').addClass('text-red-500');
                stopTimer();
            } 
            else if (game.in_draw()) {
                statusHTML = 'وضع تعادل!';
                $status.removeClass('text-red-500 text-blue-600 dark:text-blue-300 text-yellow-600 dark:text-yellow-400').addClass('text-gray-500');
                stopTimer();
            } 
            else {
                statusHTML = 'الدور على: ' + moveColor;
                $status.removeClass('text-red-500 text-gray-500');
                if(moveColor === 'الأبيض'){
                    $status.removeClass('text-yellow-600 dark:text-yellow-400').addClass('text-blue-600 dark:text-blue-300');
                } else {
                    $status.removeClass('text-blue-600 dark:text-blue-300').addClass('text-yellow-600 dark:text-yellow-400');
                }
                
                if (game.in_check()) {
                    statusHTML += ' <span class="text-red-500 text-sm ml-2">(كش ملك!)</span>';
                }
            }

            $status.html(statusHTML);
            $fenOutput.val(game.fen());
        }

        var config = {
            draggable: true,
            position: 'start',
            sparePieces: true,       
            dropOffBoard: 'trash',   
            pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png',
            onDragStart: onDragStart,
            onDrop: onDrop,
            onSnapEnd: onSnapEnd
        };
        
        board = Chessboard('myBoard', config);
        updateStatus();

        // ------------------ التفاعلات والأزرار ------------------

        $('#themeToggleBtn').on('click', function() {
            var $html = $('html');
            if ($html.hasClass('dark')) {
                $html.removeClass('dark');
                $(this).html('🌙 وضع الليل').removeClass('bg-indigo-600 hover:bg-indigo-500').addClass('bg-gray-800 hover:bg-gray-700');
            } else {
                $html.addClass('dark');
                $(this).html('☀️ وضع النهار').removeClass('bg-gray-800 hover:bg-gray-700').addClass('bg-indigo-600 hover:bg-indigo-500');
            }
        });

        $('input[name="playMode"]').on('change', function() {
            var mode = $(this).val();
            
            if (mode === 'white') {
                board.orientation('white');
                if (game.turn() === 'b') makeComputerMove();
            } else if (mode === 'black') {
                board.orientation('black');
                if (game.turn() === 'w') makeComputerMove();
            }
        });

        $('#flipBtn').on('click', function() { board.flip(); });

        function resetAnalysis() {
            $('#whiteMoveDisplay').text('--');
            $('#blackMoveDisplay').text('--');
            $('#evalDisplay').text('--');
        }

        $('#resetBtn').on('click', function() {
            if(isCalculating) return; 
            fenHistory.push(game.fen());
            redoHistory = []; // تفريغ
            game.reset();
            board.start();
            updateStatus();
            removeHighlights();
            resetTimer();
            resetAnalysis();
            
            var mode = $('input[name="playMode"]:checked').val();
            if (mode === 'black') makeComputerMove();
        });

        $('#clearBtn').on('click', function() {
            if(isCalculating) return;
            fenHistory.push(game.fen());
            redoHistory = []; // تفريغ
            game.clear();
            board.clear();
            updateStatus();
            removeHighlights();
            resetTimer();
            resetAnalysis();
        });

        // دوال لورا ولقدام الجديدة
        $('#undoBtn').off('click').on('click', function() {
            if(isCalculating || fenHistory.length === 0) return;
            redoHistory.push(game.fen()); // احفظ الوضع الحالي في لقدام
            var lastFen = fenHistory.pop();
            game.load(lastFen);             
            board.position(game.fen());     
            updateStatus();
            removeHighlights(); 
            resetAnalysis();
            if (!game.game_over() && timerSeconds > 0) startTimer();
        });

        $('#redoBtn').on('click', function() {
            if(isCalculating || redoHistory.length === 0) return;
            fenHistory.push(game.fen()); // احفظ الوضع الحالي في لورا
            var nextFen = redoHistory.pop();
            game.load(nextFen);             
            board.position(game.fen());     
            updateStatus();
            removeHighlights(); 
            resetAnalysis();
            if (!game.game_over() && timerSeconds > 0) startTimer();
        });

        // ---------------- الدالة لحساب الحركات بالألوان ----------------
        function calculateForColor(colorToMove) {
            if (isCalculating || game.game_over()) return;
            
            var $btn = colorToMove === 'w' ? $('#calcWhiteBtn') : $('#calcBlackBtn');
            var originalText = colorToMove === 'w' ? '⚪ إحسب أفضل حركة للأبيض' : '⚫ إحسب أفضل حركة للأسود';
            var btnClasses = $btn.attr('class');

            var fenParts = game.fen().split(' ');
            if (fenParts[1] !== colorToMove) {
                fenHistory.push(game.fen()); 
                redoHistory = []; 
                fenParts[1] = colorToMove;
                fenParts[3] = '-'; 
                game.load(fenParts.join(' '));
                updateStatus();
                removeHighlights();
            }

            var currentFen = game.fen();
            var currentTurn = game.turn();
            
            if (!currentFen.includes('K') || !currentFen.includes('k')) {
                $btn.attr('class', 'w-full bg-red-600 text-white py-3 px-4 rounded border border-red-700 transition font-bold text-lg mb-0 shadow-md');
                $btn.html('⚠️ حط الملوك الأول!');
                setTimeout(function() {
                    $btn.attr('class', btnClasses);
                    $btn.html(originalText);
                }, 2500);
                return;
            }

            startTimer();
            isCalculating = true;
            $btn.html('🤔 جاري التفكير...').addClass('loading').prop('disabled', true);

            var apiUrl = 'https://stockfish.online/api/s/v2.php?fen=' + encodeURIComponent(currentFen) + '&depth=15';

            $.ajax({
                url: apiUrl,
                method: 'GET',
                success: function(response) {
                    if(response.success) {
                        
                        var bestMoveParts = response.bestmove.split(' ');
                        var bestMoveText = bestMoveParts[1] || '--';
                        var ponderMoveText = bestMoveParts[3] || '--'; 
                        
                        var evalScore = response.evaluation !== null ? response.evaluation : '--';
                        if (response.mate !== null) {
                            evalScore = 'كش مات بعد ' + Math.abs(response.mate);
                        }

                        if (currentTurn === 'w') {
                            $('#whiteMoveDisplay').text(bestMoveText);
                            $('#blackMoveDisplay').text(ponderMoveText);
                        } else {
                            $('#blackMoveDisplay').text(bestMoveText);
                            $('#whiteMoveDisplay').text(ponderMoveText);
                        }
                        $('#evalDisplay').text(evalScore);

                        fenHistory.push(game.fen()); 
                        redoHistory = [];
                        var bestMoveString = bestMoveParts[1]; 
                        
                        var fromSq = bestMoveString.substring(0, 2);
                        var toSq = bestMoveString.substring(2, 4);
                        
                        var theMove = game.move(bestMoveString, { sloppy: true });
                        var isCapture = (theMove && theMove.captured != null);
                        
                        board.position(game.fen());
                        updateStatus();

                        highlightMove(fromSq, toSq);
                        playMoveSound(isCapture);
                        
                        $btn.attr('class', btnClasses).removeClass('loading').prop('disabled', false);
                        $btn.html(originalText);
                    } else {
                        $btn.attr('class', 'w-full bg-red-600 text-white py-3 px-4 rounded border border-red-700 transition font-bold text-lg mb-0 shadow-md');
                        $btn.html('⚠️ رصة غير قانونية');
                        setTimeout(function() { 
                            $btn.attr('class', btnClasses).prop('disabled', false);
                            $btn.html(originalText);
                        }, 2500);
                    }
                    isCalculating = false;
                },
                error: function() {
                    $btn.attr('class', 'w-full bg-red-600 text-white py-3 px-4 rounded border border-red-700 transition font-bold text-lg mb-0 shadow-md');
                    $btn.html('❌ السيرفر مشغول حالياً');
                    setTimeout(function() { 
                        $btn.attr('class', btnClasses).prop('disabled', false);
                        $btn.html(originalText);
                    }, 2500);
                    isCalculating = false;
                }
            });
        }

        $('#calcWhiteBtn').on('click', function() { calculateForColor('w'); });
        $('#calcBlackBtn').on('click', function() { calculateForColor('b'); });

        function makeComputerMove() {
            calculateForColor(game.turn());
        }

    </script><img src="https://chessboardjs.com/img/chesspieces/wikipedia/wP.png" id="fc5e-033e-8ebc-0be6-01fc-8daf-343d-c474" alt="" class="piece-417db" data-piece="wP" style="width: 61px; height: 61px; display: none;"><img src="https://chessboardjs.com/img/chesspieces/wikipedia/bN.png" id="29f3-86d0-3955-8c72-d019-621b-7afc-84c3" alt="" class="piece-417db" data-piece="wP" style="width: 61px; height: 61px; position: absolute; left: 1122.5px; top: 295px; display: none;">

</body></html>
