<!DOCTYPE html>
<html lang="ar" dir="rtl" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شطرنج احترافي - اللعب ضد الكمبيوتر</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; transition: background-color 0.3s, color 0.3s; }
        .board-shadow { box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .loading { animation: pulse 1.5s infinite; }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
        .spare-pieces-7492f { margin: 15px 0; display: flex; justify-content: center; gap: 10px; }
        
        .highlight-move {
            box-shadow: inset 0 0 0 100px rgba(255, 255, 51, 0.5) !important;
        }
        
        .digital-font { font-family: 'Courier New', Courier, monospace; }
    </style>
</head>
<body class="bg-gray-100 dark:bg-gray-800 text-gray-900 dark:text-gray-200 min-h-screen p-6 md:p-12">

    <div class="max-w-6xl mx-auto">
        
        <div class="mb-8 border-b border-gray-300 dark:border-gray-600 pb-4 flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-bold text-gray-900 dark:text-gray-50 mb-2">شطرنج احترافي + وضع حر</h1>
                <p class="text-gray-600 dark:text-gray-400">العب ضد أقوى محرك شطرنج، أو جرب الرص الحر براحتك.</p>
            </div>
            <button id="themeToggleBtn" class="bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-2 px-4 rounded shadow-lg transition">
                ☀️ وضع النهار
            </button>
        </div>

        <div class="flex flex-col lg:flex-row gap-10">
            
            <div class="w-full lg:w-2/3 flex justify-center lg:justify-start">
                <div class="w-full max-w-[500px]">
                    <div id="myBoard" class="w-full board-shadow border-4 border-gray-400 dark:border-gray-700 rounded-sm"></div>
                </div>
            </div>

            <div class="w-full lg:w-1/3 flex flex-col gap-5">
                
                <!-- صندوق حالة اللعبة والتايمر -->
                <div class="bg-white dark:bg-gray-700 p-5 rounded-lg border border-gray-300 dark:border-gray-600 shadow-md">
                    <div class="flex justify-between items-center mb-4 border-b border-gray-200 dark:border-gray-500 pb-2">
                        <h2 class="text-xl font-bold text-gray-800 dark:text-white">حالة اللعبة</h2>
                        <div id="timerDisplay" class="digital-font text-2xl font-bold text-gray-900 dark:text-green-400 bg-gray-200 dark:bg-gray-900 px-3 py-1 rounded shadow-inner tracking-widest">00:00</div>
                    </div>
                    <div id="status" class="text-lg font-semibold text-blue-600 dark:text-blue-300">الدور على: الأبيض</div>
                </div>

                <!-- صندوق نظام اللعب الجديد -->
                <div class="bg-white dark:bg-gray-700 p-5 rounded-lg border border-gray-300 dark:border-gray-600 shadow-md">
                    <h2 class="text-lg font-bold text-gray-800 dark:text-white mb-4 border-b border-gray-200 dark:border-gray-500 pb-2">بتلعب بمين؟ (نظام اللعب)</h2>
                    <div class="flex flex-col gap-3">
                        <label class="inline-flex items-center cursor-pointer">
                            <input type="radio" name="playMode" value="free" class="w-5 h-5 text-blue-600 bg-gray-100 border-gray-300 focus:ring-blue-500" checked>
                            <span class="mr-3 text-gray-700 dark:text-gray-200 font-medium">لعب حر (إنت بتلعب باللونين)</span>
                        </label>
                        <label class="inline-flex items-center cursor-pointer">
                            <input type="radio" name="playMode" value="white" class="w-5 h-5 text-blue-600 bg-gray-100 border-gray-300 focus:ring-blue-500">
                            <span class="mr-3 text-gray-700 dark:text-gray-200 font-medium">أنا الأبيض ⚪ (الكمبيوتر هيرد)</span>
                        </label>
                        <label class="inline-flex items-center cursor-pointer">
                            <input type="radio" name="playMode" value="black" class="w-5 h-5 text-blue-600 bg-gray-100 border-gray-300 focus:ring-blue-500">
                            <span class="mr-3 text-gray-700 dark:text-gray-200 font-medium">أنا الأسود ⚫ (الكمبيوتر هيبدأ)</span>
                        </label>
                    </div>
                </div>

                <!-- صندوق التحكم والمحرك -->
                <div class="bg-white dark:bg-gray-700 p-5 rounded-lg border border-gray-300 dark:border-gray-600 shadow-md">
                    <button id="calculateBtn" class="w-full bg-gradient-to-b from-green-500 to-green-600 dark:from-green-600 dark:to-green-700 hover:opacity-90 text-white py-3 px-4 rounded border border-green-600 dark:border-green-500 transition font-bold text-lg mb-4 shadow-md">
                        🎯 إحسب أفضل حركة
                    </button>

                    <div class="grid grid-cols-2 gap-2 mb-2">
                        <button id="undoBtn" class="bg-yellow-500 hover:bg-yellow-400 text-gray-900 font-bold py-2 px-2 rounded border border-yellow-600 shadow-sm transition">↩️ تراجع خطوة</button>
                        <button id="flipBtn" class="bg-gray-500 hover:bg-gray-400 text-white font-bold py-2 px-2 rounded border border-gray-600 shadow-sm transition">🔄 لف اللوحة</button>
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <button id="resetBtn" class="bg-red-500 hover:bg-red-400 text-white font-bold py-2 px-2 rounded border border-red-600 shadow-sm transition">🗑️ لعبة جديدة</button>
                        <button id="clearBtn" class="bg-purple-500 hover:bg-purple-400 text-white font-bold py-2 px-2 rounded border border-purple-600 shadow-sm transition">🧹 إمسح اللوحة</button>
                    </div>
                </div>

                <!-- صندوق الـ FEN -->
                <div class="bg-white dark:bg-gray-700 p-5 rounded-lg border border-gray-300 dark:border-gray-600 shadow-md">
                    <h2 class="text-sm font-bold text-gray-700 dark:text-gray-300 mb-2">كود الرصة (FEN)</h2>
                    <input type="text" id="fenOutput" readonly class="w-full bg-gray-100 dark:bg-gray-900 text-gray-600 dark:text-gray-400 border border-gray-300 dark:border-gray-600 rounded p-2 text-xs text-left focus:outline-none" dir="ltr">
                </div>

            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

    <script>
        var board = null;
        var game = new Chess();
        var $status = $('#status');
        var $fenOutput = $('#fenOutput');
        var $calcBtn = $('#calculateBtn');
        var fenHistory = [];
        var isCalculating = false;

        // --- نظام التايمر ---
        var timerSeconds = 0;
        var timerInterval = null;
        var isTimerRunning = false;

        function formatTime(sec) {
            var m = Math.floor(sec / 60).toString().padStart(2, '0');
            var s = (sec % 60).toString().padStart(2, '0');
            return m + ':' + s;
        }

        function startTimer() {
            if (!isTimerRunning) {
                isTimerRunning = true;
                timerInterval = setInterval(function() {
                    timerSeconds++;
                    $('#timerDisplay').text(formatTime(timerSeconds));
                }, 1000);
            }
        }

        function stopTimer() {
            if (isTimerRunning) {
                clearInterval(timerInterval);
                isTimerRunning = false;
            }
        }

        function resetTimer() {
            stopTimer();
            timerSeconds = 0;
            $('#timerDisplay').text('00:00');
        }
        // ------------------------

        // --- المؤثرات الصوتية ---
        var moveSound = new Audio('https://images.chesscomfiles.com/chess-themes/sounds/_MP3_/default/move-self.mp3');
        var captureSound = new Audio('https://images.chesscomfiles.com/chess-themes/sounds/_MP3_/default/capture.mp3');
        var checkSound = new Audio('https://images.chesscomfiles.com/chess-themes/sounds/_MP3_/default/check.mp3');
        var gameEndSound = new Audio('https://images.chesscomfiles.com/chess-themes/sounds/_MP3_/default/game-end.mp3');

        function playMoveSound(isCapture) {
            if (game.game_over()) {
                gameEndSound.play().catch(function(){});
            } else if (game.in_check()) {
                checkSound.play().catch(function(){});
            } else if (isCapture) {
                captureSound.play().catch(function(){});
            } else {
                moveSound.play().catch(function(){});
            }
        }

        // --- دوال الهايلايت ---
        function removeHighlights() {
            $('.highlight-move').removeClass('highlight-move');
        }

        function highlightMove(source, target) {
            removeHighlights();
            if (source && source !== 'spare' && source !== 'offboard') {
                $('#myBoard .square-' + source).addClass('highlight-move');
            }
            if (target && target !== 'offboard') {
                $('#myBoard .square-' + target).addClass('highlight-move');
            }
        }

        // منع اللاعب إنه يحرك قطع الكمبيوتر
        function onDragStart (source, piece, position, orientation) {
            if (game.game_over()) return false;

            var mode = $('input[name="playMode"]:checked').val();
            
            // لو بتلعب بأبيض والكمبيوتر عليه الدور، متتحركش
            if (mode === 'white' && game.turn() === 'b') return false;
            if (mode === 'black' && game.turn() === 'w') return false;

            // متسمحش بمسك قطع الكمبيوتر
            if (mode === 'white' && piece.search(/^b/) !== -1) return false;
            if (mode === 'black' && piece.search(/^w/) !== -1) return false;
        }

        function onDrop (source, target, piece, newPos, oldPos, orientation) {
            if (source === target) return 'snapback';
            
            startTimer();
            fenHistory.push(game.fen());

            var isCapture = false;

            if (source === 'spare') {
                isCapture = game.get(target) !== null;
                game.put({ type: piece[1].toLowerCase(), color: piece[0] }, target);
            } 
            else if (target === 'offboard') {
                game.remove(source);
            } 
            else {
                var tempMove = game.move({ from: source, to: target, promotion: 'q' });
                if (tempMove !== null) {
                    isCapture = tempMove.captured != null;
                    game.undo(); 
                } else {
                    isCapture = game.get(target) !== null;
                }

                var move = game.move({ from: source, to: target, promotion: 'q' });
                if (move === null) {
                    game.remove(source);
                    game.put({ type: piece[1].toLowerCase(), color: piece[0] }, target);
                }
            }

            updateStatus();
            highlightMove(source, target);
            playMoveSound(isCapture);

            // الرد التلقائي من الكمبيوتر
            var mode = $('input[name="playMode"]:checked').val();
            if ((mode === 'white' && game.turn() === 'b' && !game.game_over()) || 
                (mode === 'black' && game.turn() === 'w' && !game.game_over())) {
                setTimeout(makeComputerMove, 400); // 400 مللي ثانية عشان تبان واقعية
            }
        }

        function onSnapEnd () {
            board.position(game.fen());
        }

        function updateStatus () {
            var statusHTML = '';
            var moveColor = (game.turn() === 'w') ? 'الأبيض' : 'الأسود';

            if (game.in_checkmate()) {
                statusHTML = 'كش مات! الفائز: ' + (moveColor === 'الأبيض' ? 'الأسود' : 'الأبيض');
                $status.removeClass('text-blue-600 dark:text-blue-300 text-yellow-600 dark:text-yellow-400').addClass('text-red-500');
                stopTimer();
            } 
            else if (game.in_draw()) {
                statusHTML = 'وضع تعادل!';
                $status.removeClass('text-red-500 text-blue-600 dark:text-blue-300 text-yellow-600 dark:text-yellow-400').addClass('text-gray-500');
                stopTimer();
            } 
            else {
                statusHTML = 'الدور على: ' + moveColor;
                $status.removeClass('text-red-500 text-gray-500');
                if(moveColor === 'الأبيض'){
                    $status.removeClass('text-yellow-600 dark:text-yellow-400').addClass('text-blue-600 dark:text-blue-300');
                } else {
                    $status.removeClass('text-blue-600 dark:text-blue-300').addClass('text-yellow-600 dark:text-yellow-400');
                }
                
                if (game.in_check()) {
                    statusHTML += ' <span class="text-red-500 text-sm ml-2">(كش ملك!)</span>';
                }
            }

            $status.html(statusHTML);
            $fenOutput.val(game.fen());
        }

        var config = {
            draggable: true,
            position: 'start',
            sparePieces: true,       
            dropOffBoard: 'trash',   
            pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png',
            onDragStart: onDragStart,
            onDrop: onDrop,
            onSnapEnd: onSnapEnd
        };
        
        board = Chessboard('myBoard', config);
        updateStatus();

        // ------------------ التفاعلات والأزرار ------------------

        $('#themeToggleBtn').on('click', function() {
            var $html = $('html');
            if ($html.hasClass('dark')) {
                $html.removeClass('dark');
                $(this).html('🌙 وضع الليل').removeClass('bg-indigo-600 hover:bg-indigo-500').addClass('bg-gray-800 hover:bg-gray-700');
            } else {
                $html.addClass('dark');
                $(this).html('☀️ وضع النهار').removeClass('bg-gray-800 hover:bg-gray-700').addClass('bg-indigo-600 hover:bg-indigo-500');
            }
        });

        // تغيير نظام اللعب
        $('input[name="playMode"]').on('change', function() {
            var mode = $(this).val();
            
            if (mode === 'white') {
                board.orientation('white');
                if (game.turn() === 'b') makeComputerMove();
            } else if (mode === 'black') {
                board.orientation('black');
                if (game.turn() === 'w') makeComputerMove();
            }
        });

        $('#flipBtn').on('click', function() { board.flip(); });

        $('#resetBtn').on('click', function() {
            fenHistory.push(game.fen());
            game.reset();
            board.start();
            updateStatus();
            removeHighlights();
            resetTimer();
            
            // لو اليوزر مختار يلعب بالأسود وعمل ريستارت، الكمبيوتر هيبدأ الأول
            var mode = $('input[name="playMode"]:checked').val();
            if (mode === 'black') makeComputerMove();
        });

        $('#clearBtn').on('click', function() {
            fenHistory.push(game.fen());
            game.clear();
            board.clear();
            updateStatus();
            removeHighlights();
            resetTimer();
        });

        // زرار التراجع متبرمج يرجع خطوتين لو بتلعب ضد الكمبيوتر
        $('#undoBtn').on('click', function() {
            var mode = $('input[name="playMode"]:checked').val();

            if (mode !== 'free') {
                // تراجع مرتين عشان ترجع لدورك
                if (fenHistory.length >= 2) {
                    fenHistory.pop(); // ارمي حركة الكمبيوتر
                    var lastHumanFen = fenHistory.pop(); // هات حركتك القديمة
                    game.load(lastHumanFen);             
                    board.position(game.fen());     
                    updateStatus();
                    removeHighlights();
                } else if (fenHistory.length === 1) {
                    game.load(fenHistory.pop());             
                    board.position(game.fen());     
                    updateStatus();
                    removeHighlights();
                }
            } else {
                // تراجع مرة واحدة في اللعب الحر
                if (fenHistory.length > 0) {
                    var lastFen = fenHistory.pop(); 
                    game.load(lastFen);             
                    board.position(game.fen());     
                    updateStatus();
                    removeHighlights(); 
                }
            }

            if (!game.game_over() && timerSeconds > 0) {
                startTimer();
            }
        });

        // دالة حركة الكمبيوتر الأساسية
        function makeComputerMove() {
            if (isCalculating || game.game_over()) return;
            
            var currentFen = game.fen();
            var originalText = '🎯 إحسب أفضل حركة';
            
            if (!currentFen.includes('K') || !currentFen.includes('k')) {
                $calcBtn.html('⚠️ حط الملوك الأول!').addClass('bg-red-600').removeClass('from-green-500 to-green-600 dark:from-green-600 dark:to-green-700');
                setTimeout(function() {
                    $calcBtn.html(originalText).removeClass('bg-red-600').addClass('from-green-500 to-green-600 dark:from-green-600 dark:to-green-700');
                }, 2500);
                return;
            }

            startTimer();
            isCalculating = true;
            $calcBtn.html('🤔 الكمبيوتر بيفكر...').addClass('loading').prop('disabled', true);

            var apiUrl = 'https://stockfish.online/api/s/v2.php?fen=' + encodeURIComponent(currentFen) + '&depth=15';

            $.ajax({
                url: apiUrl,
                method: 'GET',
                success: function(response) {
                    if(response.success) {
                        fenHistory.push(game.fen()); 
                        var bestMoveString = response.bestmove.split(' ')[1]; 
                        
                        var fromSq = bestMoveString.substring(0, 2);
                        var toSq = bestMoveString.substring(2, 4);
                        
                        var theMove = game.move(bestMoveString, { sloppy: true });
                        var isCapture = (theMove && theMove.captured != null);
                        
                        board.position(game.fen());
                        updateStatus();

                        highlightMove(fromSq, toSq);
                        playMoveSound(isCapture);
                        
                        $calcBtn.html(originalText).removeClass('loading').prop('disabled', false);
                    } else {
                        $calcBtn.html('⚠️ رصة غير قانونية').removeClass('loading').addClass('bg-red-600').removeClass('from-green-500 to-green-600 dark:from-green-600 dark:to-green-700');
                        setTimeout(function() { 
                            $calcBtn.html(originalText).prop('disabled', false).removeClass('bg-red-600').addClass('from-green-500 to-green-600 dark:from-green-600 dark:to-green-700'); 
                        }, 2500);
                    }
                    isCalculating = false;
                },
                error: function() {
                    $calcBtn.html('❌ السيرفر مشغول حالياً').removeClass('loading').addClass('bg-red-600').removeClass('from-green-500 to-green-600 dark:from-green-600 dark:to-green-700');
                    setTimeout(function() { 
                        $calcBtn.html(originalText).prop('disabled', false).removeClass('bg-red-600').addClass('from-green-500 to-green-600 dark:from-green-600 dark:to-green-700'); 
                    }, 2500);
                    isCalculating = false;
                }
            });
        }

        // تشغيل المحرك يدوياً من الزرار
        $calcBtn.on('click', makeComputerMove);
    </script>
</body>
</html>
