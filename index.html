<!DOCTYPE html>
<html lang="ar" dir="rtl" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شطرنج احترافي - محرك Stockfish</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .board-shadow { box-shadow: 0 10px 30px rgba(0,0,0,0.7); }
        .loading { animation: pulse 1.5s infinite; }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body class="bg-gray-800 text-gray-200 min-h-screen p-6 md:p-12">

    <div class="max-w-6xl mx-auto">
        
        <div class="mb-8 border-b border-gray-600 pb-4">
            <h1 class="text-3xl font-bold text-gray-50 mb-2">شطرنج احترافي + محرك ذكي</h1>
            <p class="text-gray-400">العب من الناحيتين، أو خلي الكمبيوتر يحسبلك أحسن حركة باستخدام Stockfish 16 (مجانًا وبدون تسجيل).</p>
        </div>

        <div class="flex flex-col lg:flex-row gap-10">
            
            <!-- اللوحة -->
            <div class="w-full lg:w-2/3 flex justify-center lg:justify-start">
                <div id="myBoard" class="w-full max-w-[500px] board-shadow border-4 border-gray-700 rounded-sm bg-gray-300"></div>
            </div>

            <!-- لوحة التحكم الاحترافية -->
            <div class="w-full lg:w-1/3 flex flex-col gap-6">
                
                <!-- صندوق حالة اللعبة -->
                <div class="bg-gray-700 p-5 rounded-lg border border-gray-600 shadow-md">
                    <h2 class="text-xl font-bold text-white mb-4 border-b border-gray-500 pb-2">حالة اللعبة</h2>
                    <div id="status" class="text-lg font-semibold text-blue-300">الدور على: الأبيض</div>
                </div>

                <!-- صندوق تحديد الدور (Active Color) -->
                <div class="bg-gray-700 p-5 rounded-lg border border-gray-600 shadow-md">
                    <h2 class="text-lg font-bold text-white mb-4 border-b border-gray-500 pb-2">الدور على مين (Active Color)</h2>
                    <div class="flex flex-col gap-3">
                        <label class="inline-flex items-center cursor-pointer">
                            <input type="radio" name="turn" value="w" id="turnWhite" class="w-5 h-5 text-blue-600 bg-gray-100 border-gray-300 focus:ring-blue-500 focus:ring-2" checked>
                            <span class="mr-3 text-gray-200 font-medium">الأبيض (White to move)</span>
                        </label>
                        <label class="inline-flex items-center cursor-pointer">
                            <input type="radio" name="turn" value="b" id="turnBlack" class="w-5 h-5 text-blue-600 bg-gray-100 border-gray-300 focus:ring-blue-500 focus:ring-2">
                            <span class="mr-3 text-gray-200 font-medium">الأسود (Black to move)</span>
                        </label>
                    </div>
                </div>

                <!-- صندوق التحكم والمحرك -->
                <div class="bg-gray-700 p-5 rounded-lg border border-gray-600 shadow-md">
                    <h2 class="text-lg font-bold text-white mb-4 border-b border-gray-500 pb-2">الكمبيوتر (المحرك)</h2>
                    
                    <button id="calculateBtn" class="w-full bg-gradient-to-b from-green-600 to-green-700 hover:from-green-500 hover:to-green-600 text-white py-3 px-4 rounded border border-green-500 transition font-bold text-lg mb-4 shadow-lg">
                        🎯 إحسب أفضل حركة (Stockfish)
                    </button>

                    <div class="flex gap-2">
                        <button id="flipBtn" class="flex-1 bg-gray-600 hover:bg-gray-500 text-white py-2 px-2 rounded border border-gray-500 transition text-sm">لف اللوحة</button>
                        <button id="resetBtn" class="flex-1 bg-red-600 hover:bg-red-500 text-white py-2 px-2 rounded border border-red-500 transition text-sm">لعبة جديدة</button>
                        <button id="undoBtn" class="flex-1 bg-yellow-600 hover:bg-yellow-500 text-white py-2 px-2 rounded border border-yellow-500 transition text-sm">تراجع</button>
                    </div>
                </div>

                <!-- صندوق الـ FEN -->
                <div class="bg-gray-700 p-5 rounded-lg border border-gray-600 shadow-md">
                    <h2 class="text-sm font-bold text-gray-300 mb-2">كود الرصة (FEN)</h2>
                    <input type="text" id="fenOutput" readonly class="w-full bg-gray-900 text-gray-400 border border-gray-600 rounded p-2 text-xs text-left focus:outline-none" dir="ltr">
                </div>

            </div>
        </div>
    </div>

    <!-- المكتبات -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

    <script>
        var board = null;
        var game = new Chess();
        var $status = $('#status');
        var $fenOutput = $('#fenOutput');
        var $calcBtn = $('#calculateBtn');

        function onDragStart (source, piece, position, orientation) {
            if (game.game_over()) return false;
        }

        function onDrop (source, target) {
            var move = game.move({
                from: source,
                to: target,
                promotion: 'q'
            });

            if (move === null) return 'snapback';
            updateStatus();
        }

        function onSnapEnd () {
            board.position(game.fen());
        }

        function updateStatus () {
            var statusHTML = '';
            var moveColor = (game.turn() === 'w') ? 'الأبيض' : 'الأسود';

            if (game.in_checkmate()) {
                statusHTML = 'كش مات! الفائز: ' + (moveColor === 'الأبيض' ? 'الأسود' : 'الأبيض');
                $status.removeClass('text-yellow-400 text-blue-300').addClass('text-red-400');
            } 
            else if (game.in_draw()) {
                statusHTML = 'تعادل!';
                $status.removeClass('text-yellow-400 text-blue-300 text-red-400').addClass('text-gray-300');
            } 
            else {
                statusHTML = 'الدور على: ' + moveColor;
                $status.removeClass('text-red-400 text-gray-300');
                if(moveColor === 'الأبيض'){
                    $status.removeClass('text-yellow-400').addClass('text-blue-300');
                } else {
                    $status.removeClass('text-blue-300').addClass('text-yellow-400');
                }
                
                if (game.in_check()) {
                    statusHTML += ' <span class="text-red-400 text-sm ml-2">(كش ملك!)</span>';
                }
            }

            $status.html(statusHTML);
            $fenOutput.val(game.fen());

            // تحديث زراير اختيار الدور تلقائياً مع اللعب
            if (game.turn() === 'w') {
                $('#turnWhite').prop('checked', true);
            } else {
                $('#turnBlack').prop('checked', true);
            }
        }

        var config = {
            draggable: true,
            position: 'start',
            pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png',
            onDragStart: onDragStart,
            onDrop: onDrop,
            onSnapEnd: onSnapEnd
        };
        
        board = Chessboard('myBoard', config);
        updateStatus();

        // ------ الأزرار والتفاعلات ------

        // لما اليوزر يغير الدور بإيده من الـ Radio Buttons
        $('input[name="turn"]').on('change', function() {
            var newTurn = $(this).val();
            var fenParts = game.fen().split(' ');
            
            if (fenParts[1] !== newTurn) {
                fenParts[1] = newTurn;
                // بنصفر خانة الأكل بالتجاوز (En passant) عشان ميعملش إيرور في الرصة لما نغير الدور بالعافية
                fenParts[3] = '-'; 
                game.load(fenParts.join(' '));
                updateStatus();
            }
        });

        // زرار لف اللوحة
        $('#flipBtn').on('click', function() { board.flip(); });

        // زرار ريستارت
        $('#resetBtn').on('click', function() {
            game.reset();
            board.start();
            updateStatus();
        });

        // زرار التراجع
        $('#undoBtn').on('click', function() {
            game.undo();
            board.position(game.fen());
            updateStatus();
        });

        // الدالة السحرية للاتصال بالذكاء الاصطناعي (Stockfish API)
        $calcBtn.on('click', function() {
            if (game.game_over()) {
                alert('اللعبة خلصت يا بطل!');
                return;
            }

            var originalText = $calcBtn.html();
            $calcBtn.html('🤔 جاري التفكير وطلب المساعدة...').addClass('loading').prop('disabled', true);

            var currentFen = game.fen();
            var apiUrl = 'https://stockfish.online/api/s/v2.php?fen=' + encodeURIComponent(currentFen) + '&depth=14';

            $.ajax({
                url: apiUrl,
                method: 'GET',
                success: function(response) {
                    if(response.success) {
                        var bestMoveString = response.bestmove.split(' ')[1]; 
                        game.move(bestMoveString, { sloppy: true });
                        board.position(game.fen());
                        updateStatus();
                    } else {
                        alert('حصلت مشكلة في السيرفر، جرب تاني.');
                    }
                },
                error: function() {
                    alert('مش قادر أوصل للسيرفر، اتأكد من النت عندك.');
                },
                complete: function() {
                    $calcBtn.html(originalText).removeClass('loading').prop('disabled', false);
                }
            });
        });
    </script>
</body>
</html>
